name: ci

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # 한쪽 버전이 깨져도 다른 쪽 결과까지 끝까지 본다
      matrix:
        include:
          # 3.9 = README 가 주장하는 지원 하한. macOS 시스템 /usr/bin/python3 이자,
          #       skills·agents 가 bare `python3` 로 부르므로 실사용 기본 인터프리터다.
          #       actions/python-versions 의 3.9 프리빌드는 24.04 까지만 있다 — ubuntu-latest 가
          #       26.04 로 넘어가면 setup-python 이 하드 실패하므로 이미지를 핀한다.
          - python-version: "3.9"
            os: ubuntu-24.04
          # 3.12 = 전체 게이트를 도는 기준 버전. 러너 이미지 회귀도 함께 보도록 latest 를 쓴다.
          - python-version: "3.12"
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # 아래 버전 비교가 base 커밋을 읽는다

      # 실 데이터 유입 차단 — 한 건이라도 매치되면 실패.
      # 순수 grep 이라 인터프리터와 무관하므로 기준 버전에서 한 번만 돈다.
      - name: Sensitive-data scan
        if: matrix.python-version == '3.12'
        run: bash scripts/scan-sensitive.sh

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate plugin metadata
        if: matrix.python-version == '3.12'
        run: python scripts/validate_plugin_manifest.py

      # 3.9 잡은 python-pptx 를 일부러 설치하지 않는다 — 코어가 stdlib 만으로 도는지와
      # export 테스트의 importorskip skip 경로를 함께 확인하는 잡이다.
      # 버전 범위의 단일 진실은 requirements-dev.txt 이므로 -c 로 제약만 빌려 쓴다.
      - name: Install pytest (3.9 — 코어 stdlib 검증)
        if: matrix.python-version == '3.9'
        run: pip install -c requirements-dev.txt pytest

      - name: Install dev deps (3.12 — export 테스트 포함 전체)
        if: matrix.python-version == '3.12'
        run: pip install -r requirements-dev.txt

      # skills·agents 가 bare `python3` 로 부르는 경로 — 하한 인터프리터에서 문법이 도는지.
      - name: Compile scripts (3.9 문법 하한)
        if: matrix.python-version == '3.9'
        run: python -m compileall -q scripts/

      # compileall 은 문법만 본다. pptx_export.py 는 이 잡에서 python-pptx 가 없어
      # 테스트가 통째로 skip 되므로, import 조차 되지 않으면 3.10+ 런타임 API(datetime.UTC 등)가
      # 두 잡을 모두 통과해 3.9 실사용자에게서만 터진다. import 시점까지는 여기서 막는다.
      - name: Import smoke (3.9 — compileall 이 못 잡는 런타임 API)
        if: matrix.python-version == '3.9'
        run: python -c "import sys; sys.path.insert(0, 'scripts'); import render, pptx_import, pptx_export, plantuml_export, validate_manifest, validate_rendered_pairs, validate_plugin_manifest"

      - name: Tests
        run: python -m pytest tests/ -q

      # 런타임(scripts·skills·agents·매니페스트)이 바뀌었는데 버전이 그대로면 경고만 낸다.
      # 문서·테스트만 바뀐 PR 은 대상이 아니다. 파일 diff 여부가 아니라 version '값'을 비교한다.
      - name: Version bump reminder
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          if git diff --quiet "$base"...HEAD -- scripts/ skills/ agents/ .claude-plugin/; then
            echo "런타임 경로 변경 없음 — 버전 검사 생략"; exit 0
          fi
          ver() { python -c 'import json,sys;print(json.load(sys.stdin)["version"])'; }
          old=$(git show "$base:.claude-plugin/plugin.json" | ver)
          new=$(ver < .claude-plugin/plugin.json)
          if [ "$old" = "$new" ]; then
            echo "::warning::런타임 경로가 바뀌었는데 plugin version 이 $new 그대로입니다 — 릴리즈 전 3곳을 함께 올리세요."
          else
            echo "version $old → $new"
          fi
