name: ci

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 실 데이터 유입 차단 — 한 건이라도 매치되면 실패
      - name: Sensitive-data scan
        run: bash scripts/scan-sensitive.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest + python-pptx (export 테스트용)
        run: pip install pytest python-pptx

      - name: Tests
        run: python -m pytest tests/ -q
